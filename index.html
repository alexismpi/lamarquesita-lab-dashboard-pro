<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard Interactivo - Estrategia Marketing La Marquesita Lab">
    <meta name="author" content="La Marquesita Lab">
    <title>Dashboard Marketing - La Marquesita Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #f59e0b;
            --accent-color: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #cbd5e1;
            --text-white: #ffffff;
            --border-color: #334155;
            --gradient: linear-gradient(135deg, #2563eb, #7c3aed);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .logo-text h1 {
            color: var(--text-white);
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--secondary-color);
            font-size: 14px;
            font-weight: 500;
        }

        .header-stats {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-white);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Dashboard */
        .dashboard {
            padding: 40px 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .kpi-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .kpi-icon.followers {
            background: linear-gradient(135deg, #e91e63, #f06292);
        }

        .kpi-icon.engagement {
            background: linear-gradient(135deg, #2196f3, #64b5f6);
        }

        .kpi-icon.reach {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
        }

        .kpi-icon.reviews {
            background: linear-gradient(135deg, #4caf50, #81c784);
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .kpi-label {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .kpi-progress {
            background: var(--dark-bg);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
        }

        .kpi-progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .progress-followers { width: 65%; background: var(--danger); }
        .progress-engagement { width: 85%; background: var(--primary-color); }
        .progress-reach { width: 72%; background: var(--warning); }
        .progress-reviews { width: 90%; background: var(--success); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-white);
        }

        .card-subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-top: 4px;
        }

        /* FODA Analysis */
        .foda-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .foda-item {
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid;
        }

        .fortalezas {
            background: rgba(34, 197, 94, 0.1);
            border-left-color: var(--success);
        }

        .oportunidades {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: var(--primary-color);
        }

        .debilidades {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: var(--warning);
        }

        .amenazas {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: var(--danger);
        }

        .foda-title {
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 12px;
            font-size: 16px;
        }

        .foda-list {
            list-style: none;
        }

        .foda-list li {
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .foda-list li:last-child {
            border-bottom: none;
        }

        /* Buyer Persona */
        .persona-card {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.1));
            border: 1px solid var(--primary-color);
            border-radius: 16px;
            padding: 30px;
        }

        .persona-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .persona-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .persona-info h3 {
            font-size: 24px;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .persona-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--secondary-color);
        }

        .detail-label {
            font-weight: 600;
            color: var(--secondary-color);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            color: var(--text-white);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Editorial Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .calendar-day {
            background: var(--card-bg);
            padding: 16px 8px;
            min-height: 120px;
            font-size: 12px;
        }

        .calendar-day.has-content {
            background: rgba(37, 99, 235, 0.1);
            border-left: 3px solid var(--primary-color);
        }

        .day-number {
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .day-content {
            color: var(--text-light);
            font-size: 11px;
            line-height: 1.3;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--primary-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid var(--secondary-color);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -46px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--secondary-color);
            border-radius: 50%;
            border: 3px solid var(--dark-bg);
        }

        .timeline-date {
            font-size: 12px;
            color: var(--secondary-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timeline-title {
            font-size: 16px;
            color: var(--text-white);
            font-weight: 600;
            margin: 8px 0;
        }

        .timeline-description {
            font-size: 14px;
            color: var(--text-light);
        }

        /* Hashtags */
        .hashtag-category {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-color);
        }

        .hashtag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .hashtag {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .hashtag:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-1px);
        }

        /* Engagement Simulator */
        .simulator {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(34, 197, 94, 0.1));
            border: 1px solid var(--accent-color);
            border-radius: 16px;
            padding: 30px;
        }

        .simulator-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--dark-bg);
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .simulator-result {
            background: rgba(255, 255, 255, 0.03);
